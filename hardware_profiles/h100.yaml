gpu:
  name: "NVIDIA H100-SXM5-80GB"
  vram_gb: 80
  compute_capability: "9.0"
  architecture: "Hopper"

cuda:
  version: "12.4"
  driver: "570.x"

engines:
  mineworld:
    precision: "fp16"
    batch_size: 1
    compile: true
    recommended_model: "1200M_32f"
    max_context_frames: 32
    notes: "H100 can handle 1200M model with 32-frame context"

  open_oasis:
    precision: "fp16"
    batch_size: 1
    compile: false
    ddim_steps: 10
    max_frames: 32
    notes: "H100 FP8 tensor cores could enable future FP8 quantization"

  world_engine:
    precision: "bf16"
    batch_size: 1
    compile: true
    quantization: null
    model_uri: "Overworld/Waypoint-1-Small"
    notes: "H100 Hopper supports FP8 natively; can enable w8a8 quantization for larger models"
